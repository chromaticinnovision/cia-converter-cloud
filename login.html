<!DOCTYPE html><html lang="zh-Hans"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CIA Converter Login</title><link rel="stylesheet" href="/static/style.css"></head><body><div class="page"><div class="card login-card"><div class="brand"><div class="logo-box"><img src="/static/cia-logo.png" alt="CIA Logo"></div><div><h1>CIA Converter</h1><p class="sub">Staff Login</p></div></div>{% with messages = get_flashed_messages() %}{% if messages %}{% for message in messages %}<div class="flash">{{ message }}</div>{% endfor %}{% endif %}{% endwith %}<form method="POST" action="/login"><p>请输入公司内部 login。</p><input class="input" type="text" name="username" placeholder="Username" required style="margin-bottom:12px;"><input class="input" type="password" name="password" placeholder="Password" required style="margin-bottom:16px;"><button type="submit">Login</button></form></div></div></body></html>
